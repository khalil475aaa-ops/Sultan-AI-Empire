<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN AI EMPIRE - ULTIMATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --neon-cyan: #00f3ff; --neon-green: #39ff14; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .header { text-align: center; border-bottom: 3px solid var(--gold); padding: 15px; margin-bottom: 20px; }
        .main-container { max-width: 1200px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        .input-area { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--gold); position: relative; }
        textarea { width: 100%; height: 120px; background: #111; border: 1px solid #333; border-radius: 10px; color: var(--neon-green); padding: 15px; font-size: 18px; outline: none; text-align: right; }
        .mic-btn { position: absolute; left: 30px; bottom: 35px; font-size: 30px; color: var(--gold); cursor: pointer; transition: 0.3s; }
        .mic-btn.active { color: red; text-shadow: 0 0 10px red; animation: pulse 1s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.1);} 100% {transform: scale(1);} }
        .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .fusion-btn { background: linear-gradient(45deg, var(--gold), #ff8c00); color: black; border: none; padding: 15px 40px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px var(--gold); }
        .speaker-btn { background: #222; color: var(--gold); border: 1px solid var(--gold); padding: 15px; border-radius: 50%; font-size: 20px; cursor: pointer; }
        .workspace { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .workspace { grid-template-columns: 1fr; } }
        .terminal { background: #050505; border: 1px solid var(--neon-cyan); height: 400px; padding: 15px; overflow-y: auto; font-family: monospace; font-size: 14px; }
        .preview { background: white; border: 3px solid var(--gold); height: 400px; border-radius: 10px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="header">
        <h1 style="color:var(--gold); margin:0;">👑 SULTAN AI EMPIRE: TRIPLE BRAIN</h1>
    </div>
    <div class="main-container">
        <div class="input-area">
            <textarea id="sultanInput" placeholder="اپنا حکم یہاں لکھیں یا مائیک دبائیں..."></textarea>
            <i class="fa-solid fa-microphone mic-btn" id="micBtn" onclick="toggleVoice()"></i>
            <div class="btn-group">
                <button class="fusion-btn" onclick="runFusion()">RUN FUSION ENGINE</button>
                <button class="speaker-btn" onclick="speakText()"><i class="fa-solid fa-volume-high"></i></button>
            </div>
        </div>
        <div class="workspace">
            <div class="terminal" id="terminalOutput">
                <span style="color:var(--neon-green)">> System Ready. Brains Unified.</span><br>
                <span style="color:white">> Waiting for Sultan's command...</span>
            </div>
            <div class="preview"><iframe id="livePreview"></iframe></div>
        </div>
    </div>
    <script>
        // --- Security & Controls ---
        document.onkeydown = function(e) { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; };
        
        // --- Patient Mic (6s Wait) ---
        let recognition; let isListening = false; let silenceTimer;
        function toggleVoice() {
            const btn = document.getElementById('micBtn');
            if(isListening) { recognition.stop(); return; }
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ur-PK'; recognition.continuous = true;
            recognition.onstart = () => { isListening = true; btn.classList.add('active'); };
            recognition.onresult = (event) => {
                clearTimeout(silenceTimer);
                let text = event.results[event.results.length - 1][0].transcript;
                document.getElementById('sultanInput').value += text + " ";
                silenceTimer = setTimeout(() => { recognition.stop(); }, 6000);
            };
            recognition.onend = () => { isListening = false; btn.classList.remove('active'); };
            recognition.start();
        }

        // --- Pakistani Urdu Speaker ---
        function speakText() {
            let text = window.getSelection().toString() || document.getElementById('terminalOutput').innerText;
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = /[ا-ی]/.test(text) ? 'ur-PK' : 'en-US';
            ut.rate = 0.85; window.speechSynthesis.cancel(); window.speechSynthesis.speak(ut);
        }

        // --- Fusion Engine ---
        function runFusion() {
            const input = document.getElementById('sultanInput').value;
            const term = document.getElementById('terminalOutput');
            const pre = document.getElementById('livePreview').contentWindow.document;
            if(!input) return;
            term.innerHTML += `<br><span style="color:var(--gold)">> Executing Sultan's Command...</span>`;
            pre.open(); pre.write(`<html><body style="background:#000; color:gold; text-align:center; padding-top:50px; font-family:sans-serif;"><h1>SULTAN AI</h1><p style="color:white;">Result for: ${input}</p></body></html>`); pre.close();
            term.scrollTop = term.scrollHeight;
        }
    </script>
</body>
</html>
